baseURL: https://ginamc.github.io
languageCode: en-us
title: gina cairney
theme: ["PaperMod"]

params:
  # defaultTheme: light
  defaultTheme: dark
  # defaultTheme: auto
  disableThemeToggle: true

  homeInfoParams:
    Title: Hi, hello 👋🏼
    Content: add another line of something something

  socialIcons: # optional
    - name: "twitter"
      url: "https://x.com/ginamc"
    - name: "linkedin"
      url: "https://www.linkedin.com/in/gmcairney/"
    - name: "medium"
      url: "https://medium.com/@postsbygina"
    - name: "github"
      url: "https://github.com/ginamc"

outputs:
  home:
    - HTML
    - RSS
    - JSON # necessary for search

menu:
  main:
    - identifier: home
      name: Home
      url: /
      weight: 10   
    - identifier: about
      name: About
      url: /about
      weight: 20   
    - identifier: projects
      name: projects
      url: /projects/
      weight: 30
    - identifier: blog
      name: Blog
      url: https://ginamc.github.io/wordsbydesign
      weight: 40

markup:
  goldmark:
    extensions:
      definitionList: true
      extras:
        subscript:
          enable: true
        superscript:
          enable: true
      footnote: true
      linkify: true
      strikethrough: true
      table: true
      taskList: true
      typographer: true
    parser:
      attribute:
        block: false
        title: true
      autoHeadingID: true
      autoHeadingIDType: github
    renderer:
      hardWraps: false
      unsafe: true # <- this enables HTML rendering
      xhtml: false