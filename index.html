<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Gina's FENDfolio</title>
    <!-- INCLUDE STYLESHEET FILE -->
    <link href="https://fonts.googleapis.com/css?family=Heebo:100|Open+Sans+Condensed:300" rel="stylesheet">
    <link rel="stylesheet" type="text/css" media="screen" href="assets/css/stylesheet.css" />
    <link rel="stylesheet" type="text/css" media="screen" href="assets/css/mediaqueries.css" />
</head>

<body class="body-container">
    <!-- SPLIT THE MOCKUP INTO SECTIONS, CONTAINERS, ELEMENTS 
    USE divs TO DIFFERENTIATE BTWN INNER CONTAINERS -->
    <header class="header">
        <div class="header-logo">
            <!-- ADD LOGO -->
            <img src="assets/images/g-logo.png" alt="G logo" class="header-img" />
        </div>
        <div class="header-title">
            <!-- ADD SITE TITLE AND TAGLINE-->
            <h1 class="header-name">Gina C.</h1>
            <p class="header-tagline">Freelance Writer, Front-End Web Developer</p>
        </div>
    </header>

    <main class="content">
        <!-- <div class="container"> -->
        <!-- HERO IMAGE GOES HERE -->
        <img src="assets/images/bicycle-hero.jpg" alt="Photo by Tim Mossholder" class="hero-img" />
        <!-- UNDER THE HERO, ADD A SECTION FOR FEATURED WORK-->
        <section class="featured-work">
            <!-- ADD FEATURED WORK HEADER TEXT
            FOLLOWED BY 3 div CONTAINERS WITH IMG, TITLE, TEXT -->
            <h2 class="content-header">FEATURED WORK</h2>
            <div class="featured-container">
                <div class="featured-item">
                    <!-- ADD FEATURE ONE -->
                    <img src="assets/images/animals.jpg" alt="Photo by Rawpixel.com" class="featured-img animal responsive-img" />
                    <!-- TITLE -->
                    <h3 class="featured-header">Animal Trading Card</h3>
                    <!-- LINK OR TEXT -->
                    <p class="featured-text"><a href="https://codepen.io/ginamc/pen/pVZgvL" target="blank" class="featured-link">See Project</a></p>
                </div>
                <div class="featured-item">
                    <!-- ADD FEATURE TWO -->
                    <img src="assets/images/camera.jpg" alt="Photo by Rawpixel.com" class="featured-img photography responsive-img" />
                    <!-- TITLE -->
                    <h3 class="featured-header"><a href="https://ginamc.github.io/FEND-arcade-game/" target="blanK">Arcade Game</a></h3>
                    <!-- LINK OR TEXT -->
                    <p class="featured-text"><a href="https://github.com/ginamc/FEND-arcade-game/" target="blank">See Project</a></p>
                </div>
                <div class="featured-item">
                    <!-- ADD FEATURE THREE -->
                    <img src="assets/images/paints.jpg" alt="Photo by Steve Johnson" class="featured-img published-work responsive-img" />
                    <!-- TITLE -->
                    <h3 class="featured-header"><a href="https://ginamc.github.io/FEND-project-memory-game" target="blank">Memory Game</a></h3>
                    <!-- LINK OR TEXT -->
                    <p class="featured-text"><a href="https://github.com/ginamc/FEND-project-memory-game" target="blank">See Project</a></p>
                </div>
            </div>
        </section>
        <!--  </div> -->
    </main>

    <!-- ADD OPTIONAL FOOTER ELEMENT -->
    <footer class="footer-container">
        <div class="footer-box">
            <!-- ADD SOME TEXT HERE -->
            <p class="footer-text">Gina C. FENDfolio &copy;2018</p>
        </div>
    </footer>
</body>

</html>
